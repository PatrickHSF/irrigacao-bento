<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bento IA 1.0 - Irrigação Inteligente</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#eef1f7;
    font-family: 'Inter', sans-serif;
}

.main-card{
    width:360px;
    margin:auto;
    border-radius:30px;
    padding:30px;
    background:#f8f9fc;
    box-shadow: 
        20px 20px 60px #d9dbe6,
        -20px -20px 60px #ffffff;
}

.title{
    font-weight:600;
    font-size:20px;
}

.subtitle{
    font-size:13px;
    color:#8c8f9a;
}

/* CÍRCULO PRINCIPAL */
.circle-wrapper{
    width:170px;
    height:170px;
    margin:30px auto;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:0.6s;
}

.circle-inner{
    width:150px;
    height:150px;
    border-radius:50%;
    background:#f8f9fc;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.circle-inner h1{
    margin:0;
    font-weight:600;
}

/* CÍRCULOS SECUNDÁRIOS */
.circle-small{
    width:120px;
    height:120px;
    margin:20px auto;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:0.6s;
}

.circle-small-inner{
    width:105px;
    height:105px;
    border-radius:50%;
    background:#f8f9fc;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.badge-status{
    background:#fde68a;
    color:#92400e;
    padding:6px 15px;
    border-radius:20px;
    font-size:13px;
}

.power-btn{
    width:60px;
    height:60px;
    border-radius:50%;
    background:#1f2937;
    color:white;
    border:none;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.modal-content{
    border-radius:25px;
    padding:30px;
}
</style>
</head>

<body>

<div class="container py-5">
    <div class="main-card text-center">
        
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <div class="title">Horta Inteligente</div>
                <div class="subtitle">Controle de Irrigação</div>
            </div>
            <div>🛜</div>
        </div>

        <!-- UMIDADE -->
        <div class="circle-wrapper" id="soilCircle">
            <div class="circle-inner">
                <small>Umidade</small>
                <h1 id="soilValue">65%</h1>
                <span class="badge-status mt-2" id="soilStatus">Ideal</span>
            </div>
        </div>

        <!-- TEMPERATURA -->
        <div class="circle-small" id="tempCircle">
            <div class="circle-small-inner">
                <small>Temperatura</small>
                <h5 id="tempValue">26°C</h5>
            </div>
        </div>

        <!-- LIMITE CONFIGURADO -->
        <div class="circle-small" id="limitCircle">
            <div class="circle-small-inner">
                <small>Irriga abaixo</small>
                <h5><span id="configLimit">40</span>%</h5>
            </div>
        </div>

        <!-- STATUS VÁLVULA -->
        <div class="circle-small" id="valveCircle">
            <div class="circle-small-inner">
                <small>Válvula</small>
                <h6 id="valveStatus" style="color:#ef4444;">Desligada</h6>
            </div>
        </div>

        <div class="mt-2 text-muted" style="font-size:13px;">
            Bento IA 1.0
        </div>

        <div class="d-flex justify-content-center gap-3 mt-4">

            <!-- BOTÃO MANUAL -->
            <button class="power-btn" onclick="toggleManual()" id="manualBtn">
                ⏻
            </button>
        
            <!-- BOTÃO CONFIGURAÇÃO -->
            <button class="power-btn" data-bs-toggle="modal" data-bs-target="#configModal">
                ⚙
            </button>
        
        </div>

    </div>
</div>

<!-- MODAL -->
<div class="modal fade" id="configModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <h5>Ajustar Limite de Irrigação</h5>
      <input type="range" min="10" max="90" value="40" class="form-range mt-4" id="limitRange">
      <p class="text-center mt-2">
        Irrigar abaixo de: <strong><span id="limitValue">40</span>%</strong>
      </p>
      <button class="btn btn-dark w-100 mt-3" data-bs-dismiss="modal">Salvar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
let soil = 65;
let temp = 26;
let limit = 40;
let valve = false;
let manualMode = false;

function updateUI(){

document.getElementById("soilValue").innerText = soil + "%";
document.getElementById("tempValue").innerText = temp + "°C";
document.getElementById("configLimit").innerText = limit;

// Círculo Umidade
document.getElementById("soilCircle").style.background =
    `conic-gradient(#009eff 0% ${soil}%, #e5e7eb ${soil}% 100%)`;

// Temperatura
let tempPercent = (temp / 50) * 100;
document.getElementById("tempCircle").style.background =
    `conic-gradient(#ff9800 0% ${tempPercent}%, #e5e7eb ${tempPercent}% 100%)`;

// Limite
document.getElementById("limitCircle").style.background =
    `conic-gradient(#22c55e 0% ${limit}%, #e5e7eb ${limit}% 100%)`;

// Controle automático (só funciona se não estiver em modo manual)
if(!manualMode){
    valve = soil < limit;
}

// Atualiza visual válvula
if(valve){
    document.getElementById("valveStatus").innerText = "Ligada";
    document.getElementById("valveStatus").style.color = "#22c55e";
    document.getElementById("valveCircle").style.background =
        `conic-gradient(#22c55e 0% 100%, #e5e7eb 0% 0%)`;
} else {
    document.getElementById("valveStatus").innerText = "Desligada";
    document.getElementById("valveStatus").style.color = "#ef4444";
    document.getElementById("valveCircle").style.background =
        `conic-gradient(#ef4444 0% 100%, #e5e7eb 0% 0%)`;
}

// Status do solo
if(soil < limit){
    document.getElementById("soilStatus").innerText = "Solo Seco";
    document.getElementById("soilStatus").style.background = "#fecaca";
} else {
    document.getElementById("soilStatus").innerText = "Ideal";
    document.getElementById("soilStatus").style.background = "#fde68a";
}
}

function toggleManual(){
    manualMode = !manualMode;
    valve = manualMode;

    const btn = document.getElementById("manualBtn");

    if(manualMode){
        btn.style.background = "#22c55e";
    } else {
        btn.style.background = "#1f2937";
    }

    updateUI();
}

if(!manualMode){
    valve = soil < limit;
}

updateUI();

document.getElementById("limitRange").addEventListener("input", function(){
    limit = this.value;
    document.getElementById("limitValue").innerText = limit;
    updateUI();
});
</script>

</body>
</html>
